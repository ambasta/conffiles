# Local PipeWire-Pulse overrides as a drop-in, so upstream pipewire-pulse.conf
# updates underneath and only this delta persists. pulse.rules is an array, so
# entries here append to the defaults.
pulse.rules = [
    {
        # Firefox marks capture streams DONT_MOVE, which stops pavucontrol and
        # friends from reassigning them; drop that flag.
        matches = [ { application.process.binary = "firefox" } ]
        actions = { quirks = [ remove-capture-dont-move ] }
    }
]

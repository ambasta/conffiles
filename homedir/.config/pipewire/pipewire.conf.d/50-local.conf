# Local PipeWire overrides. Kept as a drop-in (not a vendored full pipewire.conf)
# so upstream's defaults update freely underneath and only these deltas persist.
context.properties = {
    # Warn instead of hard-failing when memory can't be mlock'd; Gentoo ships
    # sane RLIMIT_MEMLOCK, so a failure here is worth a log line, not a refusal.
    mem.warn-mlock = true
}

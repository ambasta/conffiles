[containers]
# Keep container stdout/stderr out of the journal. k8s-file writes a per-container
# ctr.log (under the container's userdata dir) instead of shipping stdout to
# journald. Note this lives under graphRoot (on disk), not tmpfs -- podman has no
# containers.conf key to relocate per-container logs; per-run use --log-opt path=.
log_driver = "k8s-file"

[engine]
cgroup_manager = "cgroupfs"
# Events to a plain file on the runtime tmpfs rather than journald, so they are
# ephemeral and never reach the journal.
events_logger = "file"
events_logfile_path = "/run/user/1000/libpod/events.log"
num_locks = 8192

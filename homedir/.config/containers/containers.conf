[engine]
# systemd (not cgroupfs) so each container gets its own transient scope;
# with cgroupfs, conmon processes pile up inside podman.service's cgroup and
# systemd logs an "unclean termination" warning per conmon on every idle-exit.
cgroup_manager = "systemd"
events_logger = "file"
num_locks = 8192
# Keep the rootless API service (DOCKER_HOST socket) alive instead of
# idle-exiting after 5s; avoids constant restart churn and cold starts for
# every compose/docker-CLI call.
service_timeout = 0

# No webcam on this machine (no /dev/video*, and PipeWire is built USE=-libcamera
# with jack disabled). Turn off video capture in the WirePlumber profile so it
# doesn't load the v4l2 monitor. This is the 0.5-era replacement for deleting the
# api.v4l2/libcamera/jack lines from a vendored pipewire.conf.
wireplumber.profiles = {
  main = {
    hardware.video-capture = disabled
  }
}

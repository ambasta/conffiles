# Explicit portal routing for the sway session. Without this,
# xdg-desktop-portal probes backends per interface: Inhibit lands on the gtk
# backend, which proxies to org.freedesktop.ScreenSaver (no owner here) and
# logs a warning per browser inhibit call.
[preferred]
default=gtk
org.freedesktop.impl.portal.ScreenCast=wlr
org.freedesktop.impl.portal.Screenshot=wlr
org.freedesktop.impl.portal.Inhibit=none

[fwupd Remote]

# this remote provides metadata and firmware marked as 'testing' from the LVFS
# Disabled: the 'testing' channel is opt-in for specific firmware, not routine
# updates. Leaving it enabled made fwupd-refresh.service fail deterministically
# (every hourly run exited 1 on "Updating lvfs-testing"). The stable 'lvfs'
# remote stays enabled. Re-enable temporarily if you need a testing release for
# a specific device.
Enabled=false
Title=Linux Vendor Firmware Service (testing)
MetadataURI=https://cdn.fwupd.org/downloads/firmware-testing.xml.zst
PrivacyURI=https://lvfs.readthedocs.io/en/latest/privacy.html
ReportURI=https://fwupd.org/lvfs/firmware/report
FirmwareBaseURI=https://fwupd.org/downloads
OrderBefore=lvfs
AutomaticReports=true
ApprovalRequired=false

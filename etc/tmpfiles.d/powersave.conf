# Full-performance is the boot default. power-mode changes these to auto only
# while the privileged extreme-powersave policy is active; udev handles devices
# added after either transition.
w /sys/bus/usb/devices/*/power/control - - - - on
w /sys/bus/pci/devices/*/power/control - - - - on
# snd_hda_intel is built in, so /etc/modprobe.d cannot set these parameters.
w /sys/module/snd_hda_intel/parameters/power_save - - - - 1
w /sys/module/snd_hda_intel/parameters/power_save_controller - - - - Y
